:root{--bg:#050507;--bg2:#0c0c10;--sf:rgba(255,255,255,0.03);--sf2:rgba(255,255,255,0.06);--bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.1);--tx:#f0f0f5;--tx2:#8b8b9e;--mt:#55556a;--ac:#7c5cfc;--ac2:#a78bfa;--acg:linear-gradient(135deg,#7c5cfc,#c084fc);--gn:#22c55e;--gns:rgba(34,197,94,0.12);--am:#eab308;--ams:rgba(234,179,8,0.12);--rd:#ef4444;--rds:rgba(239,68,68,0.12);--bl:#3b82f6;--bls:rgba(59,130,246,0.12);--pk:#ec4899;--or:#f97316;--pp:#a855f7;--cy:#06b6d4;--r:16px;--rs:10px;--sw:240px;--sc:64px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex}

/* Sidebar */
.sidebar{width:var(--sw);height:100vh;position:fixed;left:0;top:0;z-index:100;background:linear-gradient(180deg,var(--bg2) 0%,#08080c 100%);border-right:1px solid var(--bd);display:flex;flex-direction:column;transition:width 0.3s cubic-bezier(0.16,1,0.3,1);overflow:hidden}
.sidebar.c{width:var(--sc)}
.sb-head{padding:20px 16px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.sb-logo{width:36px;height:36px;min-width:36px;background:var(--acg);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 16px rgba(124,92,252,0.25)}
.sb-brand{overflow:hidden;white-space:nowrap;transition:opacity 0.15s}
.sb-name{font-size:13px;font-weight:800;letter-spacing:-0.3px;background:var(--acg);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-sub{font-size:8px;color:var(--mt);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.c .sb-brand{opacity:0;width:0}
.sb-tog{width:100%;padding:0 12px;margin-bottom:8px;flex-shrink:0;display:flex}
.sb-tog button{width:100%;padding:8px;border:1px solid var(--bd);background:var(--sf);color:var(--tx2);border-radius:8px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;transition:all 0.2s;display:flex;align-items:center;gap:8px;overflow:hidden;white-space:nowrap}
.sb-tog button:hover{background:var(--sf2);color:var(--tx)}
.c .sb-tog button{justify-content:center}
.c .sb-tog .sb-tog-text{opacity:0;width:0}
.sb-nav{flex:1;display:flex;flex-direction:column;gap:1px;padding:0 10px;overflow-y:auto;overflow-x:hidden}
.sb-sec{font-size:8px;color:var(--mt);text-transform:uppercase;letter-spacing:1.8px;font-weight:700;padding:16px 10px 6px;white-space:nowrap;transition:all 0.15s}
.c .sb-sec{opacity:0;height:0;padding:0;overflow:hidden}
.sb-link{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:var(--tx2);text-decoration:none;font-size:12px;font-weight:500;transition:all 0.15s;white-space:nowrap;overflow:hidden;position:relative;border:1px solid transparent}
.sb-link:hover{background:var(--sf2);color:var(--tx)}
.sb-link.act{background:rgba(124,92,252,0.08);color:var(--ac2);border-color:rgba(124,92,252,0.12)}
.sb-link .sb-i{width:22px;height:22px;min-width:22px;display:flex;align-items:center;justify-content:center;font-size:15px}
.sb-link .sb-t{overflow:hidden;text-overflow:ellipsis;transition:opacity 0.15s}
.c .sb-link .sb-t{opacity:0;width:0}
.c .sb-link{justify-content:center;padding:9px}
.c .sb-link:hover::after{content:attr(data-tip);position:absolute;left:calc(100% + 14px);top:50%;transform:translateY(-50%);background:#1a1a24;border:1px solid var(--bd2);color:var(--tx);padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;white-space:nowrap;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,0.5);pointer-events:none}
.sb-foot{padding:14px 16px;border-top:1px solid var(--bd);flex-shrink:0;overflow:hidden}
.sb-ft{font-size:9px;color:var(--mt);white-space:nowrap;transition:opacity 0.15s}.c .sb-ft{opacity:0}

/* Main */
.main{margin-left:var(--sw);flex:1;min-height:100vh;transition:margin-left 0.3s cubic-bezier(0.16,1,0.3,1);display:flex;flex-direction:column}
.sidebar.c~.main{margin-left:var(--sc)}
.main::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(124,92,252,0.04) 0%,transparent 50%);pointer-events:none}

/* Topbar */
.topbar{padding:20px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--bd);flex-shrink:0;position:relative;z-index:1}
.topbar-t{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.topbar-t em{font-style:normal;color:var(--ac2)}
.topbar-right{display:flex;gap:8px;align-items:center}
.topbar-btn{padding:8px 16px;border:1px solid var(--bd2);background:var(--sf2);color:var(--tx2);border-radius:var(--rs);cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;transition:all 0.2s;display:flex;align-items:center;gap:5px}
.topbar-btn:hover{background:rgba(255,255,255,0.08);color:var(--tx);transform:translateY(-1px)}
.counter-badge{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ac2);background:rgba(124,92,252,0.1);padding:4px 12px;border-radius:20px;border:1px solid rgba(124,92,252,0.15)}

/* Filters + Search */
.filters-row{padding:16px 28px;border-bottom:1px solid var(--bd);display:flex;flex-wrap:wrap;gap:10px;align-items:center;flex-shrink:0;position:relative;z-index:1}
.fg{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.fl{font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:1px}
.fb{padding:4px 11px;border-radius:14px;border:1px solid var(--bd);background:transparent;color:var(--tx2);font-family:inherit;font-size:10px;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.fb:hover{border-color:var(--bd2);color:var(--tx)}
.fb.on{border-color:var(--ac);background:rgba(124,92,252,0.15);color:var(--ac2)}
.fsep{width:1px;height:20px;background:var(--bd)}
.search-full{width:100%;padding:10px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-family:inherit;font-size:12px;transition:border-color 0.2s}
.search-full:focus{outline:none;border-color:var(--ac)}
.search-full::placeholder{color:var(--mt)}

/* Content area */
.content-area{flex:1;overflow:hidden;display:flex;position:relative;z-index:1}

/* City list sidebar */
.city-sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--bd);overflow-y:auto;padding:8px 0;background:var(--sf)}
.city-sidebar::-webkit-scrollbar{width:4px}
.city-sidebar::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.cg-header{padding:10px 16px 4px;font-size:9px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:1.5px;display:flex;justify-content:space-between;align-items:center}
.cg-badge{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ac2);background:rgba(124,92,252,0.1);padding:1px 6px;border-radius:8px}
.ci{padding:7px 16px 7px 20px;font-size:12px;color:var(--tx2);cursor:pointer;transition:all 0.12s;display:flex;align-items:center;gap:6px;border-left:2px solid transparent}
.ci:hover{color:var(--tx);background:var(--sf2)}
.ci.act{color:var(--ac2);border-left-color:var(--ac2);background:rgba(124,92,252,0.06)}
.ci-dot{width:5px;height:5px;border-radius:50%;background:var(--mt);flex-shrink:0}
.ci.act .ci-dot{background:var(--ac2)}

/* Detail panel */
.detail-panel{flex:1;overflow-y:auto;padding:28px;position:relative}
.detail-panel::-webkit-scrollbar{width:6px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--mt);font-size:14px;text-align:center}

/* Detail card */
.dc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.dc-header{padding:24px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.dc-city{font-size:22px;font-weight:800;letter-spacing:-0.5px;color:var(--tx)}
.dc-dept{font-size:12px;color:var(--tx2);margin-top:4px}
.dc-addr{font-size:11px;color:var(--mt);margin-top:2px}
.dc-county{padding:4px 12px;border-radius:14px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
.dc-body{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.dc-section{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);padding:16px}
.dc-section.full{grid-column:1/-1}
.dc-section h4{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dc-section h4 span{font-size:14px}
.dc-item{font-size:12px;color:var(--tx2);padding:4px 0;display:flex;gap:6px;align-items:flex-start;line-height:1.5}
.dc-label{color:var(--mt);font-size:10px;font-weight:600;min-width:70px;flex-shrink:0}
.dc-val{color:var(--tx)}
.dc-link{color:var(--ac2);text-decoration:none;font-size:11px;transition:color 0.15s;word-break:break-all}
.dc-link:hover{color:var(--tx)}
.dc-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;background:var(--sf);border:1px solid var(--bd);color:var(--tx2);margin:2px}
.dc-user{background:var(--sf);border:1px solid var(--bd);padding:6px 10px;border-radius:6px;margin-bottom:4px;font-family:'JetBrains Mono',monospace;font-size:11px}
.dc-empty{color:var(--mt);font-size:11px;font-style:italic}

/* Table view */
.table-view{flex:1;overflow:auto;padding:20px 28px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--mt);font-weight:600;text-align:left;padding:8px 10px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:2}
.tbl td{font-size:11px;padding:8px 10px;border-bottom:1px solid var(--bd);color:var(--tx2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl tr{cursor:pointer;transition:background 0.15s}
.tbl tr:hover td{background:var(--sf2);color:var(--tx)}
.badge{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:600;display:inline-block;white-space:nowrap}

.county-broward{background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.2)}
.county-palm{background:rgba(59,130,246,0.12);color:#3b82f6;border:1px solid rgba(59,130,246,0.2)}
.county-other{background:var(--sf2);color:var(--tx2);border:1px solid var(--bd)}

/* View toggle */
.view-btn{padding:6px 12px;border:1px solid var(--bd);background:transparent;color:var(--tx2);border-radius:var(--rs);cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;transition:all 0.15s}
.view-btn:hover{background:var(--sf2);color:var(--tx)}
.view-btn.on{border-color:var(--ac);background:rgba(124,92,252,0.1);color:var(--ac2)}

@media(max-width:1000px){.city-sidebar{display:none}.sidebar{width:var(--sc)}.c .sb-brand,.sb-brand,.sb-sec,.sb-link .sb-t,.sb-ft,.sb-tog .sb-tog-text{opacity:0;width:0}.sb-link{justify-content:center;padding:9px}.sb-tog button{justify-content:center}.main{margin-left:var(--sc)}.dc-body{grid-template-columns:1fr}}
@media(max-width:600px){.topbar{padding:16px}.filters-row{padding:12px 16px}.detail-panel{padding:16px}.table-view{padding:12px}}
</style>

var COUNTY_CLASSES={'MIAMI DADE':'county-miami','BROWARD':'county-broward','PALM BEACH':'county-palm'};
function countyClass(c){return COUNTY_CLASSES[c]||'county-other'}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

var currentView='table',selectedCity=null,filteredData=RAW.slice(),filterCounty='';

function setFilterCounty(v){filterCounty=filterCounty===v?'':v;filterData()}
function clearF(){filterCounty='';document.getElementById('searchBox').value='';selectedCity=null;filterData()}
function setView(v){currentView=v;selectedCity=null;document.getElementById('vTable').className='view-btn'+(v==='table'?' on':'');document.getElementById('vDetail').className='view-btn'+(v==='detail'?' on':'');render()}
function selectCity(city){selectedCity=city;currentView='detail';document.getElementById('vTable').className='view-btn';document.getElementById('vDetail').className='view-btn on';render()}

function filterData(){
  var q=(document.getElementById('searchBox').value||'').toLowerCase().trim();
  filteredData=RAW.filter(function(r){
    if(filterCounty&&r.county!==filterCounty)return false;
    if(!q)return true;
    var h=[r.city,r.county,r.dept,r.address,r.notes,r.inspections].concat(r.emails.map(function(e){return e.email+e.label})).concat(r.phones.map(function(p){return p.phone+p.label})).concat(r.contractors).concat(r.links.map(function(l){return l.label})).join(' ').toLowerCase();
    return h.includes(q);
  });
  render();
}

function renderFilters(){
  var counties=[];var seen={};RAW.forEach(function(r){if(!seen[r.county]){seen[r.county]=true;counties.push(r.county)}});counties.sort();
  var h='<button class="fb '+(filterCounty?'':'on')+'" onclick="setFilterCounty(\'\')">Todos</button>';
  counties.forEach(function(c){h+='<button class="fb '+(filterCounty===c?'on':'')+'" onclick="setFilterCounty(\''+c.replace(/'/g,"\\'")+'\')">'+esc(c)+'</button>'});
  document.getElementById('fCounty').innerHTML=h;
  document.getElementById('counterBadge').textContent=filteredData.length+' / '+RAW.length+' ciudades';
}

function render(){
  renderFilters();
  var area=document.getElementById('contentArea');
  if(currentView==='table'&&!selectedCity){renderTable(area)}
  else{renderDetailView(area)}
}

function renderTable(area){
  var rows=filteredData.sort(function(a,b){return a.county.localeCompare(b.county)||a.city.localeCompare(b.city)}).map(function(r){
    return'<tr onclick="selectCity(\''+r.city.replace(/'/g,"\\'")+'\')">'+ 
      '<td><span class="badge '+countyClass(r.county)+'">'+esc(r.county)+'</span></td>'+
      '<td style="font-weight:700;color:var(--tx)">'+esc(r.city)+'</td>'+
      '<td><div style="font-weight:600;font-size:11px">'+esc(r.dept)+'</div><div style="font-size:10px;color:var(--mt)">'+esc(r.address)+'</div></td>'+
      '<td>'+r.emails.slice(0,2).map(function(e){return'<div style="font-size:10px;color:var(--ac2)">'+esc(e.email)+'</div>'}).join('')+(r.emails.length>2?'<div style="font-size:9px;color:var(--mt)">+'+( r.emails.length-2)+' más</div>':'')+'</td>'+
      '<td>'+r.phones.slice(0,2).map(function(p){return'<div style="font-size:10px">'+esc(p.phone)+'</div>'}).join('')+'</td>'+
      '<td style="font-size:10px">'+r.contractors.slice(0,2).join(', ')+(r.contractors.length>2?' +':'')+'</td>'+
      '<td>'+r.links.slice(0,2).map(function(l){return'<a href="'+esc(l.url)+'" target="_blank" onclick="event.stopPropagation()" style="display:block;font-size:10px;color:var(--ac2);text-decoration:none">'+esc(l.label)+'</a>'}).join('')+'</td>'+
    '</tr>';
  }).join('');
  area.innerHTML='<div class="table-view"><table class="tbl"><thead><tr><th>Condado</th><th>Ciudad</th><th>Departamento</th><th>Emails</th><th>Teléfonos</th><th>Contractors</th><th>Enlaces</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function renderDetailView(area){
  // City sidebar + detail panel
  var groups={};filteredData.forEach(function(r){if(!groups[r.county])groups[r.county]=[];groups[r.county].push(r)});
  var sortedCounties=Object.keys(groups).sort();
  var sidebarHTML=sortedCounties.map(function(county){
    return'<div class="cg-header"><span>'+esc(county)+'</span><span class="cg-badge">'+groups[county].length+'</span></div>'+
    groups[county].sort(function(a,b){return a.city.localeCompare(b.city)}).map(function(r){
      return'<div class="ci '+(selectedCity===r.city?'act':'')+'" onclick="selectCity(\''+r.city.replace(/'/g,"\\'")+'\')">'+ 
        '<div class="ci-dot"></div>'+esc(r.city)+'</div>';
    }).join('');
  }).join('');

  var detailHTML='';
  if(selectedCity){
    var r=RAW.find(function(x){return x.city===selectedCity});
    if(r){
      detailHTML='<div class="dc"><div class="dc-header"><div><div class="dc-city">'+esc(r.city)+'</div><div class="dc-dept">'+esc(r.dept)+'</div><div class="dc-addr">📍 '+esc(r.address)+'</div></div><span class="dc-county badge '+countyClass(r.county)+'">'+esc(r.county)+'</span></div><div class="dc-body">';
      // Emails
      detailHTML+='<div class="dc-section"><h4><span>📧</span> Emails</h4>'+(r.emails.length?r.emails.map(function(e){return'<div class="dc-item"><span class="dc-label">'+esc(e.label)+'</span><span class="dc-val">'+esc(e.email)+'</span></div>'}).join(''):'<div class="dc-empty">Sin emails</div>')+'</div>';
      // Phones
      detailHTML+='<div class="dc-section"><h4><span>📞</span> Teléfonos</h4>'+(r.phones.length?r.phones.map(function(p){return'<div class="dc-item"><span class="dc-label">'+esc(p.label)+'</span><span class="dc-val">'+esc(p.phone)+'</span></div>'}).join(''):'<div class="dc-empty">Sin teléfonos</div>')+'</div>';
      // Contractors
      detailHTML+='<div class="dc-section full"><h4><span>🏗️</span> Contractors</h4><div style="display:flex;flex-wrap:wrap;gap:4px">'+(r.contractors.length?r.contractors.map(function(c){return'<span class="dc-tag">'+esc(c)+'</span>'}).join(''):'<span class="dc-empty">Sin contractors</span>')+'</div></div>';
      // Users
      detailHTML+='<div class="dc-section"><h4><span>👤</span> Usuarios</h4>'+(r.users.length?r.users.map(function(u){return'<div class="dc-user"><div>👤 '+esc(u.user)+'</div><div style="color:var(--am)">🔑 '+esc(u.pass)+'</div></div>'}).join(''):'<div class="dc-empty">Sin usuarios</div>')+'</div>';
      // Links
      detailHTML+='<div class="dc-section"><h4><span>🔗</span> Enlaces</h4>'+(r.links.length?r.links.map(function(l){return'<div class="dc-item"><span class="dc-label">'+esc(l.label)+'</span><a class="dc-link" href="'+esc(l.url)+'" target="_blank">'+esc(l.url.replace('https://','').substring(0,45))+'…</a></div>'}).join(''):'<div class="dc-empty">Sin enlaces</div>')+'</div>';
      // Inspections + Notes
      detailHTML+='<div class="dc-section"><h4><span>🔍</span> Inspecciones</h4><div class="dc-item">'+(r.inspections?esc(r.inspections):'<span class="dc-empty">Sin datos</span>')+'</div></div>';
      detailHTML+='<div class="dc-section"><h4><span>📝</span> Notas</h4><div class="dc-item" style="white-space:pre-wrap">'+(r.notes?esc(r.notes):'<span class="dc-empty">Sin notas</span>')+'</div></div>';
      // Docs
      if(r.docs.length){detailHTML+='<div class="dc-section full"><h4><span>📄</span> Documentos</h4><div style="display:flex;flex-wrap:wrap;gap:4px">'+r.docs.map(function(d){return'<span class="dc-tag" style="border-color:rgba(234,179,8,0.3);color:var(--am)">'+esc(d)+'</span>'}).join('')+'</div></div>'}
      detailHTML+='</div></div>';
    }
  }else{
    detailHTML='<div class="detail-empty"><div>🏛️<br/><br/>Selecciona una ciudad<br/>de la lista</div></div>';
  }

  area.innerHTML='<div class="city-sidebar">'+sidebarHTML+'</div><div class="detail-panel">'+detailHTML+'</div>';
}

filterData();
</script>
</body>
</html>
