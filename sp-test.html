<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test SharePoint</title>
  <script type="text/javascript" src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e8eaf0;padding:20px;font-size:14px}
    h1{margin-bottom:10px;font-size:20px}
    p{color:#9398ad;margin-bottom:16px}
    .btn{padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin:4px;color:white}
    .btn-blue{background:#6c72ff}.btn-green{background:#34d399}.btn-orange{background:#fb923c}
    .btn:hover{opacity:0.85}
    #log{background:#1a1d27;border:1px solid #353a4f;border-radius:8px;padding:16px;margin-top:16px;white-space:pre-wrap;font-family:monospace;font-size:12px;max-height:500px;overflow-y:auto;line-height:1.8}
    .ok{color:#34d399}.err{color:#f87171}.info{color:#60a5fa}.warn{color:#fbbf24}
  </style>
</head>
<body>
<h1>Test Conexion SharePoint</h1>
<p>Prueba de autenticacion y acceso a listas.</p>
<div>
  <button class="btn btn-blue" onclick="doLogin()">1. Iniciar sesion</button>
  <button class="btn btn-green" onclick="readProjects()">2. Leer proyectos</button>
  <button class="btn btn-green" onclick="readSeguimiento()">3. Leer seguimiento</button>
  <button class="btn btn-orange" onclick="writeTest()">4. Escribir test</button>
</div>
<div id="log">Esperando...\n</div>

<script>
var logEl=document.getElementById('log');
function addLog(msg,cls){logEl.innerHTML+='<span class="'+(cls||'')+'">'+msg+'</span>\n';logEl.scrollTop=logEl.scrollHeight}

var CLIENT_ID='fab38841-9eea-43ec-90e7-dcde9dfec093';
var TENANT_ID='bab53ead-1cca-4e29-882d-60236ad916f6';
var SP_SITE='https://avpconsultinginc.sharepoint.com/sites/CODECLEARPERMIT';
var LIST_PROJECTS='Lista de seguimiento de progreso';
var LIST_SEGUIMIENTO='Seguimiento de Emails';

var msalApp=null;
var accessToken=null;

// Init MSAL
try{
  if(typeof msal==='undefined'){
    addLog('ERROR: msal library not loaded from CDN','err');
  } else {
    addLog('MSAL library loaded OK','ok');
    msalApp=new msal.PublicClientApplication({
      auth:{
        clientId:CLIENT_ID,
        authority:'https://login.microsoftonline.com/'+TENANT_ID,
        redirectUri:window.location.origin+'/email-manager-pro/sp-test.html'
      },
      cache:{cacheLocation:'sessionStorage'}
    });
    addLog('MSAL app created OK','ok');
  }
}catch(e){
  addLog('MSAL init error: '+e.message,'err');
}

async function doLogin(){
  if(!msalApp){addLog('MSAL not ready','err');return}
  addLog('---LOGIN---','info');

  try{
    var accounts=msalApp.getAllAccounts();
    addLog('Existing accounts: '+accounts.length);

    if(accounts.length>0){
      addLog('Found: '+accounts[0].username,'ok');
      try{
        var sr=await msalApp.acquireTokenSilent({scopes:[SP_SITE+'/.default'],account:accounts[0]});
        accessToken=sr.accessToken;
        addLog('Silent token OK (len='+accessToken.length+')','ok');
        return;
      }catch(se){addLog('Silent failed: '+se.message+', trying popup...','warn')}
    }

    addLog('Opening login popup...','info');
    var lr=await msalApp.loginPopup({scopes:[SP_SITE+'/.default']});
    addLog('Login OK: '+lr.account.username,'ok');

    var tr=await msalApp.acquireTokenSilent({scopes:[SP_SITE+'/.default'],account:lr.account});
    accessToken=tr.accessToken;
    addLog('Token OK (len='+accessToken.length+')','ok');
  }catch(e){
    addLog('Login error: '+e.message,'err');
    if(e.message.indexOf('popup')>=0) addLog('TIP: Allow popups for this site','warn');
  }
}

async function spGet(url){
  if(!accessToken){addLog('Login first','err');return null}
  try{
    var r=await fetch(url,{headers:{'Authorization':'Bearer '+accessToken,'Accept':'application/json;odata=verbose'}});
    if(!r.ok){var t=await r.text();addLog('HTTP '+r.status+': '+t.substring(0,200),'err');return null}
    return await r.json();
  }catch(e){addLog('Fetch err: '+e.message,'err');return null}
}

async function readProjects(){
  addLog('---PROJECTS---','info');
  var url=SP_SITE+"/_api/web/lists/getbytitle('"+encodeURIComponent(LIST_PROJECTS)+"')/items?$select=Title&$top=10&$orderby=Title";
  addLog('URL: '+url);
  var d=await spGet(url);
  if(d&&d.d&&d.d.results){
    addLog('Found: '+d.d.results.length+' projects','ok');
    d.d.results.forEach(function(it,i){addLog('  '+(i+1)+'. '+it.Title)});
  }else{addLog('Could not read projects','err')}
}

async function readSeguimiento(){
  addLog('---SEGUIMIENTO---','info');
  var url=SP_SITE+"/_api/web/lists/getbytitle('"+encodeURIComponent(LIST_SEGUIMIENTO)+"')/items?$select=Title,Proyecto,Asunto,Estado&$top=5";
  addLog('URL: '+url);
  var d=await spGet(url);
  if(d&&d.d&&d.d.results){
    addLog('Found: '+d.d.results.length+' records','ok');
    d.d.results.forEach(function(it,i){addLog('  '+(i+1)+'. '+it.Title+' | '+(it.Proyecto||'-'))});
  }else{addLog('Could not read seguimiento','err')}
}

async function writeTest(){
  addLog('---WRITE TEST---','info');
  if(!accessToken){addLog('Login first','err');return}
  var url=SP_SITE+"/_api/web/lists/getbytitle('"+encodeURIComponent(LIST_SEGUIMIENTO)+"')/items";
  try{
    var r=await fetch(url,{
      method:'POST',
      headers:{'Authorization':'Bearer '+accessToken,'Accept':'application/json;odata=verbose','Content-Type':'application/json;odata=verbose'},
      body:JSON.stringify({'__metadata':{'type':'SP.Data.Seguimiento_x0020_de_x0020_EmailsListItem'},'Title':'TEST '+new Date().toLocaleString()})
    });
    if(r.ok){var d=await r.json();addLog('Created ID: '+d.d.Id,'ok')}
    else{var t=await r.text();addLog('Write err HTTP '+r.status+': '+t.substring(0,300),'err')}
  }catch(e){addLog('Write err: '+e.message,'err')}
}
</script>
</body>
</html>
