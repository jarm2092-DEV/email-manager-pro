<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Power Automate</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e8eaf0;padding:20px;font-size:14px}
    h1{margin-bottom:10px;font-size:20px}
    p{color:#9398ad;margin-bottom:16px}
    .btn{padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin:4px;color:white}
    .btn-green{background:#34d399}.btn-orange{background:#fb923c}
    .btn:hover{opacity:0.85}.btn:disabled{opacity:0.4;cursor:wait}
    #log{background:#1a1d27;border:1px solid #353a4f;border-radius:8px;padding:16px;margin-top:16px;white-space:pre-wrap;font-family:monospace;font-size:12px;max-height:500px;overflow-y:auto;line-height:1.8}
    .ok{color:#34d399}.err{color:#f87171}.info{color:#60a5fa}.warn{color:#fbbf24}
  </style>
</head>
<body>
<h1>Test Power Automate Flows</h1>
<p>Prueba la conexion con SharePoint via Power Automate.</p>
<div>
  <button class="btn btn-green" id="btnRead" onclick="testRead()">1. Leer Proyectos</button>
  <button class="btn btn-orange" id="btnWrite" onclick="testWrite()">2. Escribir Test en Seguimiento</button>
</div>
<div id="log">Listo para probar...\n</div>

<script>
var logEl=document.getElementById('log');
function addLog(msg,cls){logEl.innerHTML+='<span class="'+(cls||'')+'">'+msg+'</span>\n';logEl.scrollTop=logEl.scrollHeight}

var FLOW_READ='https://defaultbab53ead1cca4e29882d60236ad916.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/6bd81083debf4e7a8100cd389d9cb8e1/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=j9uUHpx-GrJKBF-ld5fspTK9zyPGsbcA5HgwyqrX0o0';

// Flow 2 URL - PENDIENTE (se reemplaza cuando lo cree)
var FLOW_WRITE='PENDIENTE';

async function testRead(){
  var btn=document.getElementById('btnRead');
  btn.disabled=true;btn.textContent='Cargando...';
  addLog('--- LEER PROYECTOS ---','info');
  addLog('Llamando al flow...','info');
  try{
    var r=await fetch(FLOW_READ,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({})
    });
    addLog('HTTP Status: '+r.status);
    var text=await r.text();
    addLog('Response length: '+text.length+' chars');
    try{
      var data=JSON.parse(text);
      if(Array.isArray(data)){
        addLog('Proyectos encontrados: '+data.length,'ok');
        data.slice(0,15).forEach(function(item,i){
          var title=item.Title||item.fields?.Title||JSON.stringify(item).substring(0,80);
          addLog('  '+(i+1)+'. '+title);
        });
        if(data.length>15) addLog('  ... y '+(data.length-15)+' mas');
      } else if(data.error){
        addLog('Error del flow: '+JSON.stringify(data.error),'err');
      } else {
        addLog('Respuesta (no es array): '+text.substring(0,500),'warn');
      }
    }catch(pe){
      addLog('Respuesta raw: '+text.substring(0,500),'warn');
    }
  }catch(e){
    addLog('Error: '+e.message,'err');
    if(e.message.indexOf('CORS')>=0||e.message.indexOf('fetch')>=0){
      addLog('Puede ser un error de CORS. Verificando...','warn');
    }
  }
  btn.disabled=false;btn.textContent='1. Leer Proyectos';
}

async function testWrite(){
  if(FLOW_WRITE==='PENDIENTE'){addLog('Flow de escritura aun no configurado','warn');return}
  var btn=document.getElementById('btnWrite');
  btn.disabled=true;btn.textContent='Escribiendo...';
  addLog('--- ESCRIBIR TEST ---','info');
  try{
    var r=await fetch(FLOW_WRITE,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        titulo:'TEST desde Add-in',
        proyecto:'TEST-0000',
        asunto:'Email de prueba',
        de:'test@test.com',
        fecha:new Date().toISOString(),
        estado:'Pendiente',
        notas:'Esta es una nota de prueba creada desde el add-in'
      })
    });
    addLog('HTTP Status: '+r.status);
    var text=await r.text();
    try{
      var data=JSON.parse(text);
      if(data.ok) addLog('Registro creado exitosamente!','ok');
      else addLog('Respuesta: '+text.substring(0,300),'warn');
    }catch(pe){
      addLog('Respuesta: '+text.substring(0,300),'warn');
    }
  }catch(e){
    addLog('Error: '+e.message,'err');
  }
  btn.disabled=false;btn.textContent='2. Escribir Test en Seguimiento';
}
</script>
</body>
</html>
