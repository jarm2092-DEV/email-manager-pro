<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Drawing Workload</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#050507;--bg2:#0c0c10;--surface:rgba(255,255,255,0.03);--surface2:rgba(255,255,255,0.06);
      --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
      --text:#f0f0f5;--text2:#8b8b9e;--muted:#55556a;
      --accent:#7c5cfc;--accent2:#a78bfa;--accent-g:linear-gradient(135deg,#7c5cfc,#c084fc);
      --green:#22c55e;--green-s:rgba(34,197,94,0.12);
      --amber:#eab308;--amber-s:rgba(234,179,8,0.12);
      --red:#ef4444;--red-s:rgba(239,68,68,0.12);
      --blue:#3b82f6;--blue-s:rgba(59,130,246,0.12);
      --pink:#ec4899;--pink-s:rgba(236,72,153,0.12);
      --purple:#a855f7;--purple-s:rgba(168,85,247,0.12);
      --orange:#f97316;--orange-s:rgba(249,115,22,0.12);
      --cyan:#06b6d4;--cyan-s:rgba(6,182,212,0.12);
      --radius:16px;--radius-sm:10px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
    body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    
    /* Subtle grid bg */
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(124,92,252,0.06) 0%,transparent 60%);pointer-events:none;z-index:0}
    
    .page{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:24px 28px 48px}

    /* Header */
    .dash-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px}
    .dash-title{font-size:28px;font-weight:800;letter-spacing:-1px;background:var(--accent-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .dash-sub{font-size:13px;color:var(--text2);margin-top:4px;font-weight:400}
    .dash-actions{display:flex;gap:8px}
    .dash-btn{padding:9px 18px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all 0.2s;display:flex;align-items:center;gap:6px}
    .dash-btn:hover{background:rgba(255,255,255,0.08);color:var(--text);transform:translateY(-1px)}
    .dash-btn.primary{background:var(--accent);color:white;border-color:transparent}
    .dash-btn.primary:hover{opacity:0.9}

    /* KPI Row */
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
    .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:all 0.3s}
    .kpi:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
    .kpi-value{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;letter-spacing:-1px;line-height:1}
    .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-top:8px}
    .kpi-accent{position:absolute;top:0;left:0;right:0;height:2px}

    /* Grid */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:28px}

    /* Card */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:all 0.3s}
    .card:hover{border-color:var(--border2)}
    .card-title{font-size:14px;font-weight:700;margin-bottom:16px;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px}
    .card-title span{font-size:16px}

    /* Bar chart */
    .bar-chart{display:flex;flex-direction:column;gap:10px}
    .bar-row{display:flex;align-items:center;gap:12px}
    .bar-name{font-size:12px;font-weight:600;width:90px;flex-shrink:0;color:var(--text2);text-align:right}
    .bar-track{flex:1;height:28px;background:rgba(255,255,255,0.03);border-radius:6px;overflow:hidden;position:relative}
    .bar-fill{height:100%;border-radius:6px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);display:flex;align-items:center;padding:0 10px;min-width:fit-content}
    .bar-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:rgba(255,255,255,0.9)}
    
    /* Stacked bar */
    .stacked-bar{display:flex;height:28px;border-radius:6px;overflow:hidden;gap:1px}
    .stacked-seg{height:100%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:rgba(255,255,255,0.85);transition:width 0.8s cubic-bezier(0.16,1,0.3,1);min-width:0;overflow:hidden}

    /* Status dist */
    .status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
    .status-card{background:var(--surface2);border-radius:var(--radius-sm);padding:14px;text-align:center;border:1px solid transparent;transition:all 0.2s}
    .status-card:hover{border-color:var(--border2);transform:scale(1.02)}
    .status-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700}
    .status-name{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-top:4px;line-height:1.3}

    /* Table */
    .detail-table{width:100%;border-collapse:collapse}
    .detail-table th{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
    .detail-table td{font-size:12px;padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
    .detail-table tr:hover td{background:var(--surface2);color:var(--text)}
    .detail-table .td-name{font-weight:600;color:var(--text)}
    .td-badge{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;display:inline-block}

    /* Legend */
    .legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
    .legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

    /* Loading */
    .loading-full{text-align:center;padding:80px;color:var(--muted)}
    .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Responsive */
    @media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr)}.grid-2,.grid-3{grid-template-columns:1fr}}
    @media(max-width:600px){.kpi-row{grid-template-columns:1fr}.page{padding:16px}}

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .anim{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0}
  </style>
</head>
<body>
<div class="page">

  <div class="dash-header anim" style="animation-delay:0ms">
    <div>
      <div class="dash-title">Drawing Workload</div>
      <div class="dash-sub">Balance de carga y capacidad por dibujante — <span id="timestamp"></span></div>
    </div>
    <div class="dash-actions">
      <button class="dash-btn" onclick="loadData()">↻ Actualizar</button>
      <a href="dwstatus.html" class="dash-btn primary" style="text-decoration:none">✏️ Ir a Estado de Dibujos</a>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-row" id="kpis">
    <div class="loading-full" style="grid-column:1/-1"><div class="spinner"></div><br/>Cargando datos...</div>
  </div>

  <!-- Charts row 1 -->
  <div class="grid-2" id="chartsRow1"></div>

  <!-- Charts row 2 -->
  <div class="grid-2" id="chartsRow2"></div>

  <!-- Detail table -->
  <div class="card anim" style="animation-delay:600ms" id="tableCard"></div>

</div>

<script>
var FLOW_READ='https://defaultbab53ead1cca4e29882d60236ad916.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/6bd81083debf4e7a8100cd389d9cb8e1/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=j9uUHpx-GrJKBF-ld5fspTK9zyPGsbcA5HgwyqrX0o0';

var DIBUJANTES=['YASMANY','GUSTAVO','MAIKRO','YARIEL','YOLEXIS','JANNIK','YOSVANY'];
var STATUS_ORDER=['Por comenzar','En dibujo','Corrección','En espera de Ing Prof','En espera de Ing Express','Pendiente de informacion (Client)','Terminado','NO REQUIERE'];
var STATUS_COLORS={
  'Por comenzar':'var(--amber)','En dibujo':'var(--blue)','Corrección':'var(--red)',
  'En espera de Ing Prof':'var(--purple)','En espera de Ing Express':'var(--pink)',
  'Pendiente de informacion (Client)':'var(--orange)','Terminado':'var(--green)','NO REQUIERE':'var(--muted)'
};
var STATUS_BG={
  'Por comenzar':'var(--amber-s)','En dibujo':'var(--blue-s)','Corrección':'var(--red-s)',
  'En espera de Ing Prof':'var(--purple-s)','En espera de Ing Express':'var(--pink-s)',
  'Pendiente de informacion (Client)':'var(--orange-s)','Terminado':'var(--green-s)','NO REQUIERE':'rgba(85,85,106,0.15)'
};
var DIB_COLORS=['#7c5cfc','#22c55e','#3b82f6','#eab308','#ec4899','#f97316','#06b6d4'];

var projects=[];

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

async function loadData(){
  document.getElementById('kpis').innerHTML='<div class="loading-full" style="grid-column:1/-1"><div class="spinner"></div><br/>Cargando...</div>';
  try{
    var r=await fetch(FLOW_READ,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    var data=await r.json();
    projects=data.map(function(it){
      var dw=it.DWSTATUS||it.DWStatus||it.dwstatus||'';
      if(dw&&typeof dw==='object')dw=dw.Value||'';
      var db=it.DIBUJANTE||it.Dibujante||it.dibujante||'';
      if(db&&typeof db==='object')db=db.Value||'';
      return{title:(it.Title||'').toString(),dwstatus:typeof dw==='string'?dw:'',dibujante:typeof db==='string'?db:''};
    }).filter(function(p){return p.title.length>0});
    document.getElementById('timestamp').textContent=new Date().toLocaleString('es-ES');
    renderDashboard();
  }catch(e){
    document.getElementById('kpis').innerHTML='<div class="loading-full" style="grid-column:1/-1;color:var(--red)">Error: '+esc(e.message)+'</div>';
  }
}

function renderDashboard(){
  var total=projects.length;
  var assigned=projects.filter(p=>p.dibujante&&p.dibujante!=='NO REQUIERE').length;
  var active=projects.filter(p=>['En dibujo','Corrección'].includes(p.dwstatus)).length;
  var pending=projects.filter(p=>p.dwstatus==='Por comenzar').length;
  var done=projects.filter(p=>p.dwstatus==='Terminado').length;
  var waiting=projects.filter(p=>p.dwstatus&&p.dwstatus.includes('espera')).length;

  // KPIs
  document.getElementById('kpis').innerHTML=
    kpiHTML(total,'Total Proyectos','var(--accent-g)')+
    kpiHTML(active,'En Progreso','linear-gradient(135deg,var(--blue),var(--cyan))')+
    kpiHTML(pending,'Por Comenzar','linear-gradient(135deg,var(--amber),var(--orange))')+
    kpiHTML(done,'Terminados','linear-gradient(135deg,var(--green),#34d399)');

  // Workload per dibujante
  var dibData=DIBUJANTES.map(function(name,ci){
    var ps=projects.filter(p=>p.dibujante===name);
    var activos=ps.filter(p=>!['Terminado','NO REQUIERE'].includes(p.dwstatus)).length;
    var terminados=ps.filter(p=>p.dwstatus==='Terminado').length;
    return{name:name,total:ps.length,activos:activos,terminados:terminados,color:DIB_COLORS[ci%DIB_COLORS.length],projects:ps};
  }).sort((a,b)=>b.activos-a.activos);

  var maxLoad=Math.max(...dibData.map(d=>d.activos),1);

  // Chart 1: Carga activa por dibujante
  var barsHTML=dibData.map(function(d){
    var pct=Math.round(d.activos/maxLoad*100);
    return '<div class="bar-row">'+
      '<div class="bar-name">'+esc(d.name)+'</div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+d.color+'"><span class="bar-num">'+d.activos+'</span></div></div>'+
    '</div>';
  }).join('');

  // Chart 2: Status distribution
  var statusCount={};
  STATUS_ORDER.forEach(function(s){statusCount[s]=projects.filter(p=>p.dwstatus===s).length});
  var statusHTML=STATUS_ORDER.map(function(s){
    var c=statusCount[s];
    var color=STATUS_COLORS[s]||'var(--muted)';
    var bg=STATUS_BG[s]||'var(--surface2)';
    return '<div class="status-card" style="border-color:'+color+'20">'+
      '<div class="status-val" style="color:'+color+'">'+c+'</div>'+
      '<div class="status-name">'+esc(s)+'</div></div>';
  }).join('');

  document.getElementById('chartsRow1').innerHTML=
    '<div class="card anim" style="animation-delay:200ms"><div class="card-title"><span>📊</span> Carga Activa por Dibujante</div><div class="bar-chart">'+barsHTML+'</div></div>'+
    '<div class="card anim" style="animation-delay:300ms"><div class="card-title"><span>🎯</span> Distribución por Estado</div><div class="status-grid">'+statusHTML+'</div></div>';

  // Chart 3: Stacked bars (breakdown per dibujante)
  var stackedHTML=dibData.map(function(d){
    var segments='';
    var activeStatuses=STATUS_ORDER.filter(s=>s!=='NO REQUIERE');
    activeStatuses.forEach(function(s){
      var count=d.projects.filter(p=>p.dwstatus===s).length;
      if(count>0){
        var pct=Math.round(count/Math.max(d.total,1)*100);
        segments+='<div class="stacked-seg" style="width:'+pct+'%;background:'+STATUS_COLORS[s]+'">'+(pct>=8?count:'')+'</div>';
      }
    });
    if(!segments)segments='<div class="stacked-seg" style="width:100%;background:var(--surface2);color:var(--muted)">0</div>';
    return '<div class="bar-row"><div class="bar-name">'+esc(d.name)+'</div><div class="bar-track" style="background:transparent"><div class="stacked-bar" style="width:100%">'+segments+'</div></div></div>';
  }).join('');

  var legendHTML=STATUS_ORDER.filter(s=>s!=='NO REQUIERE').map(function(s){
    return '<div class="legend-item"><div class="legend-dot" style="background:'+STATUS_COLORS[s]+'"></div>'+esc(s)+'</div>';
  }).join('');

  // Chart 4: Capacity gauge
  var avgLoad=assigned>0?Math.round(dibData.reduce((a,d)=>a+d.activos,0)/DIBUJANTES.length):0;
  var maxDib=dibData[0];
  var minDib=dibData[dibData.length-1];
  var balance=maxDib&&minDib?maxDib.activos-minDib.activos:0;

  var gaugeHTML='<div style="display:flex;flex-direction:column;gap:16px">'+
    '<div style="display:flex;gap:16px">'+
      '<div style="flex:1;background:var(--surface2);border-radius:var(--radius-sm);padding:16px;text-align:center">'+
        '<div style="font-family:JetBrains Mono;font-size:28px;font-weight:700;color:var(--accent2)">'+avgLoad+'</div>'+
        '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px">Prom. Activos</div></div>'+
      '<div style="flex:1;background:var(--surface2);border-radius:var(--radius-sm);padding:16px;text-align:center">'+
        '<div style="font-family:JetBrains Mono;font-size:28px;font-weight:700;color:'+(balance>5?'var(--red)':balance>2?'var(--amber)':'var(--green)')+'">'+balance+'</div>'+
        '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px">Desbalance</div></div>'+
    '</div>'+
    '<div style="font-size:11px;color:var(--text2);line-height:1.6">'+
      '🔺 <strong style="color:var(--text)">'+esc(maxDib?maxDib.name:'—')+'</strong> tiene más carga ('+maxDib.activos+' activos)<br>'+
      '🔻 <strong style="color:var(--text)">'+esc(minDib?minDib.name:'—')+'</strong> tiene menos carga ('+minDib.activos+' activos)<br>'+
      (balance>5?'⚠️ <span style="color:var(--amber)">Desbalance alto — considerar redistribuir</span>':
       balance>2?'📋 Desbalance moderado':'✅ <span style="color:var(--green)">Carga equilibrada</span>')+
    '</div>'+
  '</div>';

  document.getElementById('chartsRow2').innerHTML=
    '<div class="card anim" style="animation-delay:400ms"><div class="card-title"><span>📈</span> Desglose por Dibujante</div><div class="bar-chart">'+stackedHTML+'</div><div class="legend">'+legendHTML+'</div></div>'+
    '<div class="card anim" style="animation-delay:500ms"><div class="card-title"><span>⚖️</span> Balance de Carga</div>'+gaugeHTML+'</div>';

  // Detail table
  var rowsHTML=dibData.map(function(d){
    var enDibujo=d.projects.filter(p=>p.dwstatus==='En dibujo').length;
    var correccion=d.projects.filter(p=>p.dwstatus==='Corrección').length;
    var porComenzar=d.projects.filter(p=>p.dwstatus==='Por comenzar').length;
    var espera=d.projects.filter(p=>p.dwstatus&&p.dwstatus.includes('espera')).length;
    var pendInfo=d.projects.filter(p=>p.dwstatus&&p.dwstatus.includes('Pendiente')).length;
    var terminados=d.terminados;
    var loadPct=maxLoad>0?Math.round(d.activos/maxLoad*100):0;
    var loadColor=loadPct>80?'var(--red)':loadPct>50?'var(--amber)':'var(--green)';
    return '<tr>'+
      '<td class="td-name" style="color:'+d.color+'">'+esc(d.name)+'</td>'+
      '<td><span style="font-family:JetBrains Mono;font-weight:600">'+d.total+'</span></td>'+
      '<td><span class="td-badge" style="background:var(--blue-s);color:var(--blue)">'+enDibujo+'</span></td>'+
      '<td><span class="td-badge" style="background:var(--red-s);color:var(--red)">'+correccion+'</span></td>'+
      '<td><span class="td-badge" style="background:var(--amber-s);color:var(--amber)">'+porComenzar+'</span></td>'+
      '<td><span class="td-badge" style="background:var(--purple-s);color:var(--purple)">'+espera+'</span></td>'+
      '<td><span class="td-badge" style="background:var(--orange-s);color:var(--orange)">'+pendInfo+'</span></td>'+
      '<td><span class="td-badge" style="background:var(--green-s);color:var(--green)">'+terminados+'</span></td>'+
      '<td><span style="font-family:JetBrains Mono;font-weight:700;color:'+loadColor+'">'+loadPct+'%</span></td>'+
    '</tr>';
  }).join('');

  document.getElementById('tableCard').innerHTML=
    '<div class="card-title"><span>📋</span> Detalle por Dibujante</div>'+
    '<div style="overflow-x:auto"><table class="detail-table"><thead><tr>'+
    '<th>Dibujante</th><th>Total</th><th>En Dibujo</th><th>Corrección</th><th>Por Comenzar</th><th>En Espera</th><th>Pend. Info</th><th>Terminados</th><th>Carga</th>'+
    '</tr></thead><tbody>'+rowsHTML+'</tbody></table></div>';
}

function kpiHTML(val,label,gradient){
  return '<div class="kpi anim" style="animation-delay:100ms"><div class="kpi-accent" style="background:'+gradient+'"></div>'+
    '<div class="kpi-value">'+val+'</div><div class="kpi-label">'+label+'</div></div>';
}

loadData();
</script>
</body>
</html>
