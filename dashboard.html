<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Drawing Workload</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#050507;--bg2:#0c0c10;--surface:rgba(255,255,255,0.03);--surface2:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);--text:#f0f0f5;--text2:#8b8b9e;--muted:#55556a;--accent:#7c5cfc;--accent2:#a78bfa;--accent-g:linear-gradient(135deg,#7c5cfc,#c084fc);--green:#22c55e;--green-s:rgba(34,197,94,0.12);--amber:#eab308;--amber-s:rgba(234,179,8,0.12);--red:#ef4444;--red-s:rgba(239,68,68,0.12);--blue:#3b82f6;--blue-s:rgba(59,130,246,0.12);--pink:#ec4899;--pink-s:rgba(236,72,153,0.12);--purple:#a855f7;--purple-s:rgba(168,85,247,0.12);--orange:#f97316;--orange-s:rgba(249,115,22,0.12);--cyan:#06b6d4;--cyan-s:rgba(6,182,212,0.12);--radius:16px;--radius-sm:10px}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
    body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(124,92,252,0.06) 0%,transparent 60%);pointer-events:none;z-index:0}
    .page{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:24px 28px 48px}
    .dash-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:16px}
    .dash-title{font-size:28px;font-weight:800;letter-spacing:-1px;background:var(--accent-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .dash-sub{font-size:13px;color:var(--text2);margin-top:4px;font-weight:400}
    .dash-actions{display:flex;gap:8px;flex-wrap:wrap}
    .dash-btn{padding:9px 18px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all 0.2s;display:flex;align-items:center;gap:6px;text-decoration:none}
    .dash-btn:hover{background:rgba(255,255,255,0.08);color:var(--text);transform:translateY(-1px)}
    .dash-btn.primary{background:var(--accent);color:white;border-color:transparent}
    .dash-btn.primary:hover{opacity:0.9}

    /* Filters bar */
    .filters-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:24px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
    .filter-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .filter-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-right:4px}
    .fbtn{padding:4px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:inherit;font-size:11px;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap}
    .fbtn:hover{border-color:var(--border2);color:var(--text)}
    .fbtn.on{border-color:var(--accent);background:rgba(124,92,252,0.15);color:var(--accent2)}
    .filter-sep{width:1px;height:24px;background:var(--border);margin:0 4px}

    /* KPI */
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
    .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:all 0.3s;cursor:default}
    .kpi:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
    .kpi-value{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;letter-spacing:-1px;line-height:1}
    .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-top:8px}
    .kpi-accent{position:absolute;top:0;left:0;right:0;height:2px}

    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:all 0.3s}
    .card:hover{border-color:var(--border2)}
    .card-title{font-size:14px;font-weight:700;margin-bottom:16px;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px}
    .card-title span{font-size:16px}

    /* Bars */
    .bar-chart{display:flex;flex-direction:column;gap:10px}
    .bar-row{display:flex;align-items:center;gap:12px;cursor:pointer;padding:2px 0;border-radius:6px;transition:background 0.15s}
    .bar-row:hover{background:var(--surface2)}
    .bar-row.selected{background:rgba(124,92,252,0.08)}
    .bar-name{font-size:12px;font-weight:600;width:90px;flex-shrink:0;color:var(--text2);text-align:right;transition:color 0.15s}
    .bar-row:hover .bar-name,.bar-row.selected .bar-name{color:var(--text)}
    .bar-track{flex:1;height:28px;background:rgba(255,255,255,0.03);border-radius:6px;overflow:hidden}
    .bar-fill{height:100%;border-radius:6px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);display:flex;align-items:center;padding:0 10px;min-width:fit-content}
    .bar-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:rgba(255,255,255,0.9)}
    .stacked-bar{display:flex;height:28px;border-radius:6px;overflow:hidden;gap:1px}
    .stacked-seg{height:100%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:rgba(255,255,255,0.85);transition:width 0.8s cubic-bezier(0.16,1,0.3,1);min-width:0;overflow:hidden}

    .status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
    .status-card{background:var(--surface2);border-radius:var(--radius-sm);padding:14px;text-align:center;border:1px solid transparent;transition:all 0.2s;cursor:pointer}
    .status-card:hover{border-color:var(--border2);transform:scale(1.03)}
    .status-card.on{box-shadow:0 0 0 2px var(--accent)}
    .status-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700}
    .status-name{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-top:4px;line-height:1.3}

    .legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
    .legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:24px;animation:fadeIn 0.2s ease}
    .modal-overlay.open{display:flex}
    .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);width:100%;max-width:700px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,0.6);animation:modalIn 0.3s cubic-bezier(0.16,1,0.3,1)}
    @keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .modal-header{padding:20px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
    .modal-name{font-size:20px;font-weight:800;letter-spacing:-0.5px}
    .modal-stats{display:flex;gap:16px;font-size:12px;color:var(--text2);margin-top:4px}
    .modal-stats strong{color:var(--text);font-family:'JetBrains Mono',monospace}
    .modal-close{width:36px;height:36px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s;flex-shrink:0}
    .modal-close:hover{background:var(--red-s);color:var(--red);border-color:var(--red)}
    .modal-body{padding:20px 24px;overflow-y:auto;flex:1}
    .modal-summary{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .modal-chip{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px}
    .modal-chip .chip-n{font-family:'JetBrains Mono',monospace;font-weight:700}
    .dp-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;border:1px solid var(--border);margin-bottom:6px;transition:all 0.15s}
    .dp-item:hover{background:var(--surface2);border-color:var(--border2)}
    .dp-id{font-weight:700;font-size:13px;color:var(--text);min-width:90px}
    .dp-addr{font-size:11px;color:var(--muted);flex:1;margin:0 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .dp-status{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;white-space:nowrap}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    /* Table */
    .detail-table{width:100%;border-collapse:collapse}
    .detail-table th{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
    .detail-table td{font-size:12px;padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
    .detail-table tr{cursor:pointer;transition:background 0.15s}
    .detail-table tr:hover td{background:var(--surface2);color:var(--text)}
    .td-name{font-weight:600;color:var(--text)}
    .td-badge{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;display:inline-block}

    .loading-full{text-align:center;padding:80px;color:var(--muted)}
    .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .anim{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0}
    @media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}.filters-bar{flex-direction:column;align-items:flex-start}.filter-sep{display:none}}
    @media(max-width:600px){.kpi-row{grid-template-columns:1fr}.page{padding:16px}}
  </style>
</head>
<body>
<div class="page">
  <div class="dash-header anim">
    <div>
      <div class="dash-title">Drawing Workload</div>
      <div class="dash-sub">Balance de carga y capacidad — <span id="timestamp"></span></div>
    </div>
    <div class="dash-actions">
      <button class="dash-btn" onclick="exportCSV()">📥 Exportar CSV</button>
      <button class="dash-btn" onclick="loadData()">↻ Actualizar</button>
      <a href="dwstatus.html" class="dash-btn primary">✏️ Estado de Dibujos</a>
    </div>
  </div>

  <div class="filters-bar anim" style="animation-delay:50ms">
    <div class="filter-group"><span class="filter-lbl">Dibujante</span><div id="fDib"></div></div>
    <div class="filter-sep"></div>
    <div class="filter-group"><span class="filter-lbl">Estado</span><div id="fSt"></div></div>
    <div class="filter-sep"></div>
    <button class="fbtn" onclick="clearFilters()" style="color:var(--red);border-color:rgba(239,68,68,0.3)">✕ Limpiar</button>
  </div>

  <div id="modalOverlay" class="modal-overlay" onclick="if(event.target===this)closeDetail()">
    <div class="modal" id="modalContent"></div>
  </div>
  <div class="kpi-row" id="kpis"><div class="loading-full" style="grid-column:1/-1"><div class="spinner"></div></div></div>
  <div class="grid-2" id="row1"></div>
  <div class="grid-2" id="row2"></div>
  <div class="card anim" style="animation-delay:500ms" id="tableCard"></div>
</div>

<script>
var FLOW_READ='https://defaultbab53ead1cca4e29882d60236ad916.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/6bd81083debf4e7a8100cd389d9cb8e1/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=j9uUHpx-GrJKBF-ld5fspTK9zyPGsbcA5HgwyqrX0o0';
var DIBS=['YASMANY','GUSTAVO','MAIKRO','YARIEL','YOLEXIS','JANNIK','YOSVANY'];
var ST_ORDER=['Por comenzar','En dibujo','Corrección','En espera de Ing Prof','En espera de Ing Express','Pendiente de informacion (Client)','Terminado','NO REQUIERE'];
var ST_C={'Por comenzar':'var(--amber)','En dibujo':'var(--blue)','Corrección':'var(--red)','En espera de Ing Prof':'var(--purple)','En espera de Ing Express':'var(--pink)','Pendiente de informacion (Client)':'var(--orange)','Terminado':'var(--green)','NO REQUIERE':'var(--muted)'};
var ST_BG={'Por comenzar':'var(--amber-s)','En dibujo':'var(--blue-s)','Corrección':'var(--red-s)','En espera de Ing Prof':'var(--purple-s)','En espera de Ing Express':'var(--pink-s)','Pendiente de informacion (Client)':'var(--orange-s)','Terminado':'var(--green-s)','NO REQUIERE':'rgba(85,85,106,0.15)'};
var DC=['#7c5cfc','#22c55e','#3b82f6','#eab308','#ec4899','#f97316','#06b6d4'];
var allProjects=[],fDib='',fSt='',selectedDib='';

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function splitP(f){if(!f)return{id:'',addr:''};var m=f.match(/^([A-Za-z]{2,5}-\d{3,5})[- ]*(.*)/);return m?{id:m[1].toUpperCase(),addr:(m[2]||'').replace(/^-\s*/,'').trim()}:{id:f,addr:''}}
function filtered(){return allProjects.filter(p=>{if(fDib&&p.dib!==fDib)return false;if(fSt&&p.st!==fSt)return false;return true})}

function setFDib(v){fDib=fDib===v?'':v;selectedDib='';closeDetail();renderAll()}
function setFSt(v){fSt=fSt===v?'':v;selectedDib='';closeDetail();renderAll()}
function clearFilters(){fDib='';fSt='';selectedDib='';closeDetail();renderAll()}

function renderFilters(){
  var h='<button class="fbtn '+(fDib?'':'on')+'" onclick="setFDib(\'\')">Todos</button>';
  DIBS.forEach(d=>{h+='<button class="fbtn '+(fDib===d?'on':'')+'" onclick="setFDib(\''+d+'\')">'+d+'</button>'});
  document.getElementById('fDib').innerHTML=h;
  var h2='<button class="fbtn '+(fSt?'':'on')+'" onclick="setFSt(\'\')">Todos</button>';
  ST_ORDER.forEach(s=>{h2+='<button class="fbtn '+(fSt===s?'on':'')+'" onclick="setFSt(\''+s.replace(/'/g,"\\'")+'\')">'+esc(s)+'</button>'});
  document.getElementById('fSt').innerHTML=h2;
}

async function loadData(){
  document.getElementById('kpis').innerHTML='<div class="loading-full" style="grid-column:1/-1"><div class="spinner"></div></div>';
  try{
    var r=await fetch(FLOW_READ,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    var data=await r.json();
    allProjects=data.map(it=>{
      var dw=it.DWSTATUS||it.DWStatus||it.dwstatus||'';if(dw&&typeof dw==='object')dw=dw.Value||'';if(typeof dw!=='string')dw='';
      var db=it.DIBUJANTE||it.Dibujante||it.dibujante||'';if(db&&typeof db==='object')db=db.Value||'';if(typeof db!=='string')db='';
      return{title:(it.Title||'').toString(),st:dw,dib:db};
    }).filter(p=>p.title.length>0);
    document.getElementById('timestamp').textContent=new Date().toLocaleString('es-ES');
    renderAll();
  }catch(e){document.getElementById('kpis').innerHTML='<div class="loading-full" style="grid-column:1/-1;color:var(--red)">Error: '+esc(e.message)+'</div>'}
}

function renderAll(){
  renderFilters();
  var ps=filtered();var total=ps.length;
  var active=ps.filter(p=>['En dibujo','Corrección'].includes(p.st)).length;
  var pending=ps.filter(p=>p.st==='Por comenzar').length;
  var done=ps.filter(p=>p.st==='Terminado').length;

  document.getElementById('kpis').innerHTML=kpi(total,'Total Proyectos','var(--accent-g)')+kpi(active,'En Progreso','linear-gradient(135deg,var(--blue),var(--cyan))')+kpi(pending,'Por Comenzar','linear-gradient(135deg,var(--amber),var(--orange))')+kpi(done,'Terminados','linear-gradient(135deg,var(--green),#34d399)');

  var dd=DIBS.map((n,ci)=>{var pp=ps.filter(p=>p.dib===n);return{name:n,total:pp.length,activos:pp.filter(p=>!['Terminado','NO REQUIERE'].includes(p.st)).length,terminados:pp.filter(p=>p.st==='Terminado').length,color:DC[ci],ps:pp}}).sort((a,b)=>b.activos-a.activos);
  var mx=Math.max(...dd.map(d=>d.activos),1);

  // Bars
  var bars=dd.map((d,i)=>'<div class="bar-row '+(selectedDib===d.name?'selected':'')+'" onclick="toggleDetail(\''+d.name+'\')"><div class="bar-name">'+esc(d.name)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(d.activos/mx*100)+'%;background:'+d.color+'"><span class="bar-num">'+d.activos+'</span></div></div></div>').join('');

  // Status dist
  var stH=ST_ORDER.map(s=>{var c=ps.filter(p=>p.st===s).length;return'<div class="status-card '+(fSt===s?'on':'')+'" onclick="setFSt(\''+s.replace(/'/g,"\\'")+'\')" style="border-color:'+(ST_C[s]||'var(--muted)')+'20"><div class="status-val" style="color:'+(ST_C[s]||'var(--muted)')+'">'+c+'</div><div class="status-name">'+esc(s)+'</div></div>'}).join('');

  document.getElementById('row1').innerHTML='<div class="card anim" style="animation-delay:200ms"><div class="card-title"><span>📊</span> Carga Activa por Dibujante <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:auto">clic para detalles</span></div><div class="bar-chart">'+bars+'</div></div><div class="card anim" style="animation-delay:300ms"><div class="card-title"><span>🎯</span> Distribución por Estado <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:auto">clic para filtrar</span></div><div class="status-grid">'+stH+'</div></div>';

  // Stacked
  var stacked=dd.map(d=>{var segs='';ST_ORDER.filter(s=>s!=='NO REQUIERE').forEach(s=>{var c=d.ps.filter(p=>p.st===s).length;if(c){var pct=Math.round(c/Math.max(d.total,1)*100);segs+='<div class="stacked-seg" style="width:'+pct+'%;background:'+ST_C[s]+'">'+(pct>=8?c:'')+'</div>'}});if(!segs)segs='<div class="stacked-seg" style="width:100%;background:var(--surface2);color:var(--muted)">0</div>';return'<div class="bar-row" onclick="toggleDetail(\''+d.name+'\')"><div class="bar-name">'+esc(d.name)+'</div><div class="bar-track" style="background:transparent"><div class="stacked-bar" style="width:100%">'+segs+'</div></div></div>'}).join('');
  var leg=ST_ORDER.filter(s=>s!=='NO REQUIERE').map(s=>'<div class="legend-item"><div class="legend-dot" style="background:'+ST_C[s]+'"></div>'+esc(s)+'</div>').join('');

  // Balance
  var avg=DIBS.length?Math.round(dd.reduce((a,d)=>a+d.activos,0)/DIBS.length):0;
  var hi=dd[0],lo=dd[dd.length-1],bal=hi&&lo?hi.activos-lo.activos:0;
  var balC=bal>5?'var(--red)':bal>2?'var(--amber)':'var(--green)';
  var balMsg=bal>5?'⚠️ <span style="color:var(--amber)">Desbalance alto</span>':bal>2?'📋 Desbalance moderado':'✅ <span style="color:var(--green)">Carga equilibrada</span>';
  var gauge='<div style="display:flex;gap:16px;margin-bottom:16px"><div style="flex:1;background:var(--surface2);border-radius:var(--radius-sm);padding:16px;text-align:center"><div style="font-family:JetBrains Mono;font-size:28px;font-weight:700;color:var(--accent2)">'+avg+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px">Prom. Activos</div></div><div style="flex:1;background:var(--surface2);border-radius:var(--radius-sm);padding:16px;text-align:center"><div style="font-family:JetBrains Mono;font-size:28px;font-weight:700;color:'+balC+'">'+bal+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px">Desbalance</div></div></div><div style="font-size:11px;color:var(--text2);line-height:1.8">🔺 <strong style="color:var(--text)">'+esc(hi?hi.name:'—')+'</strong> más carga ('+hi.activos+')<br>🔻 <strong style="color:var(--text)">'+esc(lo?lo.name:'—')+'</strong> menos carga ('+lo.activos+')<br>'+balMsg+'</div>';

  document.getElementById('row2').innerHTML='<div class="card anim" style="animation-delay:400ms"><div class="card-title"><span>📈</span> Desglose por Dibujante</div><div class="bar-chart">'+stacked+'</div><div class="legend">'+leg+'</div></div><div class="card anim" style="animation-delay:450ms"><div class="card-title"><span>⚖️</span> Balance de Carga</div>'+gauge+'</div>';

  // Table
  var rows=dd.map(d=>{var enD=d.ps.filter(p=>p.st==='En dibujo').length,cor=d.ps.filter(p=>p.st==='Corrección').length,pc=d.ps.filter(p=>p.st==='Por comenzar').length,esp=d.ps.filter(p=>p.st&&p.st.includes('espera')).length,pi=d.ps.filter(p=>p.st&&p.st.includes('Pendiente')).length,lp=total>0?Math.round(d.activos/total*100):0,lc=lp>15?'var(--red)':lp>8?'var(--amber)':'var(--green)';return'<tr onclick="toggleDetail(\''+d.name+'\')"><td class="td-name" style="color:'+d.color+'">'+esc(d.name)+'</td><td><span style="font-family:JetBrains Mono;font-weight:600">'+d.total+'</span></td><td><span class="td-badge" style="background:var(--blue-s);color:var(--blue)">'+enD+'</span></td><td><span class="td-badge" style="background:var(--red-s);color:var(--red)">'+cor+'</span></td><td><span class="td-badge" style="background:var(--amber-s);color:var(--amber)">'+pc+'</span></td><td><span class="td-badge" style="background:var(--purple-s);color:var(--purple)">'+esp+'</span></td><td><span class="td-badge" style="background:var(--orange-s);color:var(--orange)">'+pi+'</span></td><td><span class="td-badge" style="background:var(--green-s);color:var(--green)">'+d.terminados+'</span></td><td><span style="font-family:JetBrains Mono;font-weight:700;color:'+lc+'">'+lp+'%</span></td></tr>'}).join('');
  document.getElementById('tableCard').innerHTML='<div class="card-title"><span>📋</span> Detalle por Dibujante <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:auto">clic en fila para ver proyectos</span></div><div style="overflow-x:auto"><table class="detail-table"><thead><tr><th>Dibujante</th><th>Total</th><th>En Dibujo</th><th>Corrección</th><th>Por Comenzar</th><th>Espera</th><th>Pend. Info</th><th>Terminados</th><th>Carga</th></tr></thead><tbody>'+rows+'</tbody></table></div>';

  // Re-render detail if open
  if(selectedDib)showDetail(selectedDib);
}

function toggleDetail(name){
  if(selectedDib===name){closeDetail();return}
  selectedDib=name;showDetail(name);
}
function closeDetail(){selectedDib='';document.getElementById('modalOverlay').className='modal-overlay';document.getElementById('modalContent').innerHTML=''}
function showDetail(name){
  var ps=filtered().filter(p=>p.dib===name);
  var total=filtered().length;
  var ci=DIBS.indexOf(name);var color=DC[ci>=0?ci:0];
  var activos=ps.filter(p=>!['Terminado','NO REQUIERE'].includes(p.st)).length;

  // Summary chips per status
  var chips='';
  ST_ORDER.forEach(s=>{var c=ps.filter(p=>p.st===s).length;if(c)chips+='<div class="modal-chip" style="background:'+(ST_BG[s]||'var(--surface2)')+';color:'+(ST_C[s]||'var(--muted)')+'"><span class="chip-n">'+c+'</span> '+esc(s)+'</div>'});

  var items=ps.sort((a,b)=>{var ai=ST_ORDER.indexOf(a.st),bi=ST_ORDER.indexOf(b.st);return(ai<0?99:ai)-(bi<0?99:bi)}).map(p=>{var sp=splitP(p.title);var sc=ST_C[p.st]||'var(--muted)';var sb=ST_BG[p.st]||'var(--surface2)';return'<div class="dp-item"><div class="dp-id" style="color:'+color+'">'+esc(sp.id)+'</div><div class="dp-addr">'+esc(sp.addr)+'</div><div class="dp-status" style="background:'+sb+';color:'+sc+'">'+esc(p.st||'Sin estado')+'</div></div>'}).join('');

  var pct=total>0?Math.round(activos/total*100):0;

  document.getElementById('modalContent').innerHTML=
    '<div class="modal-header"><div><div class="modal-name" style="color:'+color+'">'+esc(name)+'</div>'+
    '<div class="modal-stats"><span><strong>'+ps.length+'</strong> total</span><span><strong>'+activos+'</strong> activos</span><span><strong>'+pct+'%</strong> de carga</span></div></div>'+
    '<button class="modal-close" onclick="closeDetail()">✕</button></div>'+
    '<div class="modal-body"><div class="modal-summary">'+chips+'</div>'+
    (items||'<div style="padding:20px;text-align:center;color:var(--muted)">Sin proyectos asignados</div>')+'</div>';
  document.getElementById('modalOverlay').className='modal-overlay open';
}

function kpi(v,l,g){return'<div class="kpi anim" style="animation-delay:100ms"><div class="kpi-accent" style="background:'+g+'"></div><div class="kpi-value">'+v+'</div><div class="kpi-label">'+l+'</div></div>'}

function exportCSV(){
  var ps=filtered();
  var csv='Proyecto,Direccion,Estado,Dibujante\n';
  ps.forEach(p=>{var sp=splitP(p.title);csv+='"'+sp.id+'","'+sp.addr+'","'+p.st+'","'+p.dib+'"\n'});
  var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='drawing_workload_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

loadData();
</script>
